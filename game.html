<!DOCTYPE html>
<html>
<head>
  <title>2-Player Dino Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

    /* Updated to match your style.css palette */
    :root {
      --orange:  #BF5700; /* Primary accent from your links */
      --black:   #000000; /* Primary text and borders */
      --light-blue: #CBDCEB; /* Content panels / cards */
      --sky-blue:   #6D94C5; /* Main page background */
      --white:   #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--sky-blue);
      color: var(--black);
      font-family: Copperplate, "Papyrus", fantasy;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 40px;
      line-height: 1.6;
    }

    /* Navigation matching your style.css vibe */
    .site-nav {
      width: 100%;
      background: var(--black);
      padding: 12px 24px;
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    .nav-link {
      color: var(--white);
      text-decoration: underline;
      padding: 8px 18px;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.2s;
    }
    .nav-link:hover, .nav-link.active { 
      background: var(--white); 
      color: var(--orange); 
      border-radius: 4px;
      text-decoration: none;
    }

    .header { text-align: center; padding: 30px 20px 10px; width: 100%; max-width: 900px; }
    .header h1 {
      font-size: clamp(24px, 4vw, 42px);
      color: var(--black);
      background: var(--light-blue);
      border: 3px solid var(--black);
      border-radius: 8px;
      padding: 20px;
      letter-spacing: 1px;
      display: inline-block;
      margin-bottom: 15px;
    }
    .header .sub { font-family: 'VT323', monospace; font-size: 24px; color: var(--white); text-shadow: 1px 1px var(--black); }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: min(800px, 95vw);
      padding: 15px 20px;
      background: var(--black);
      border: 3px solid var(--black);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
    }
    .player-score { font-family: Copperplate, fantasy; display: flex; flex-direction: column; gap: 4px; }
    .player-score.p1 { color: var(--orange); }
    .player-score.p2 { color: var(--light-blue); }
    .score-val { font-size: clamp(18px, 3vw, 28px); font-weight: bold; }
    .hi-score { color: #888; font-size: 11px; }

    #gameCanvas {
      display: block;
      background: var(--light-blue);
      border: 4px solid var(--black);
      border-top: none;
      border-radius: 0 0 8px 8px;
      width: min(800px, 95vw);
      height: 220px;
    }

    .controls { display: flex; gap: 20px; margin: 25px 0; flex-wrap: wrap; justify-content: center; max-width: 900px; }
    .ctrl-box { 
      border-radius: 8px; 
      padding: 15px 25px; 
      font-size: 16px; 
      text-align: center;
      border: 3px solid var(--black);
      box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
    }
    .ctrl-box.p1 { background: var(--white); color: var(--orange); border-left: 6px solid var(--orange); }
    .ctrl-box.p2 { background: var(--white); color: var(--black); border-left: 6px solid var(--black); }
    .ctrl-box .key { 
      display: inline-block; 
      background: var(--black); 
      color: var(--white); 
      border-radius: 4px; 
      padding: 2px 10px; 
      font-family: 'VT323', monospace; 
      font-size: 20px;
      margin: 0 4px;
    }

    #overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; pointer-events: none; }
    .canvas-wrap { position: relative; width: min(800px, 95vw); }
    .overlay-title { font-size: 24px; color: var(--black); font-weight: bold; background: var(--white); padding: 5px 15px; border: 2px solid var(--black); border-radius: 4px; }
    
    .winner-banner { font-size: 20px; padding: 12px 30px; border-radius: 8px; border: 4px solid var(--black); font-weight: bold; }
    .winner-banner.p1 { background: var(--orange); color: var(--white); }
    .winner-banner.p2 { background: var(--black); color: var(--white); }
    .winner-banner.tie { background: var(--white); color: var(--black); }

    .lives-row { display: flex; justify-content: space-between; width: min(800px, 95vw); padding: 10px 20px; font-size: 18px; font-weight: bold; color: var(--black); }

    .footer-note { font-family: 'VT323', monospace; color: var(--white); font-size: 20px; margin-top: 20px; }
    #speedLabel { color: var(--white); font-weight: bold; font-size: 22px; }
    #speedTitle { color: #888; font-size: 10px; }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-link">Home</a>
  <a href="game.html" class="nav-link active">Dino Game</a>
</nav>

<div class="header">
  <h1>2-PLAYER DINO RACE</h1>
  <div class="sub">Last dino standing wins!</div>
</div>

<div class="score-bar">
  <div class="player-score p1">
    <span>PLAYER 1</span>
    <span class="score-val" id="score1">0</span>
    <span class="hi-score">BEST: <span id="hi1">0</span></span>
  </div>
  <div style="text-align:center;">
    <span id="speedTitle">GAME SPEED</span><br><span id="speedLabel">1x</span>
  </div>
  <div class="player-score p2" style="text-align:right;">
    <span>PLAYER 2</span>
    <span class="score-val" id="score2">0</span>
    <span class="hi-score">BEST: <span id="hi2">0</span></span>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="gameCanvas" width="800" height="220"></canvas>
  <div id="overlay">
    <div class="overlay-title" id="overlayTitle">READY?</div>
    <div class="winner-banner" id="winnerBanner" style="display:none;"></div>
    <div class="overlay-sub" id="overlaySub" style="color:var(--black); font-weight:bold; background: rgba(255,255,255,0.7); padding: 5px;">Press SPACE or ENTER to start</div>
  </div>
</div>

<div class="lives-row">
  <span class="lp1" id="lives1" style="color: var(--orange);">P1: ♥ ♥ ♥</span>
  <span class="lp2" id="lives2">P2: ♥ ♥ ♥</span>
</div>

<div class="controls">
  <div class="ctrl-box p1">
    PLAYER 1<br>
    Jump: <span class="key">SPACE</span> Duck: <span class="key">↓</span>
  </div>
  <div class="ctrl-box p2">
    PLAYER 2<br>
    Jump: <span class="key">ENTER</span> Duck: <span class="key">SHIFT</span>
  </div>
</div>

<div class="footer-note">3 lives each · dodge the obstacles · survive!</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resize();
window.addEventListener('resize', resize);

const W = () => canvas.width;
const H = () => canvas.height;
const GROUND = () => H() - 40;

let state = 'idle';
let frame = 0;
let speed = 5;
let obstacles = [];
let nextObstacle = 80;
let hiScore = [0, 0];

const DINO_W = 36, DINO_H = 52, DINO_DUCK_H = 28;
const GRAVITY = 0.7, JUMP_VY = -13;

const players = [
  { x: 70,  y: 0, vy: 0, ducking: false, alive: true, lives: 3, score: 0, jumpKey: false, duckKey: false, color: '#BF5700', outline: '#000000', name: 'P1', flashTimer: 0 },
  { x: 130, y: 0, vy: 0, ducking: false, alive: true, lives: 3, score: 0, jumpKey: false, duckKey: false, color: '#FFFFFF', outline: '#000000', name: 'P2', flashTimer: 0 },
];

const keys = {};
document.addEventListener('keydown', e => {
  if (['Space','Enter','ArrowDown','ShiftLeft','ShiftRight'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (state === 'idle' || state === 'gameover') {
    if (e.code === 'Space' || e.code === 'Enter') startGame();
    return;
  }
  if (e.code === 'Space' && !players[0].jumpKey) { players[0].jumpKey = true; tryJump(players[0]); }
  if (e.code === 'Enter' && !players[1].jumpKey) { players[1].jumpKey = true; tryJump(players[1]); }
  if (e.code === 'ArrowDown') players[0].duckKey = true;
  if (['ShiftLeft','ShiftRight'].includes(e.code)) players[1].duckKey = true;
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space') players[0].jumpKey = false;
  if (e.code === 'Enter') players[1].jumpKey = false;
  if (e.code === 'ArrowDown') players[0].duckKey = false;
  if (['ShiftLeft','ShiftRight'].includes(e.code)) players[1].duckKey = false;
});

function tryJump(p) {
  if (!p.alive) return;
  if (p.y >= GROUND() - (p.ducking ? DINO_DUCK_H : DINO_H) - 2) p.vy = JUMP_VY;
}

function startGame() {
  state = 'playing'; frame = 0; speed = 5; obstacles = []; nextObstacle = 100;
  players.forEach(p => {
    p.y = GROUND() - DINO_H; p.vy = 0; p.ducking = false;
    p.alive = true; p.lives = 3; p.score = 0; p.flashTimer = 0;
  });
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('winnerBanner').style.display = 'none';
}

function endRound(loser) {
  loser.lives--;
  loser.flashTimer = 60;
  if (loser.lives <= 0) {
    loser.alive = false;
    state = 'gameover';
    showGameOver(players.find(p => p !== loser));
  } else {
    setTimeout(() => { loser.y = GROUND() - DINO_H; loser.vy = 0; loser.flashTimer = 0; }, 600);
  }
  updateLives();
}

function showGameOver(winner) {
  const banner = document.getElementById('winnerBanner');
  document.getElementById('overlay').style.display = 'flex';
  if (!winner) { banner.className = 'winner-banner tie'; banner.textContent = "IT'S A TIE!"; }
  else { banner.className = `winner-banner ${winner === players[0] ? 'p1' : 'p2'}`; banner.textContent = `${winner.name} WINS!`; }
  banner.style.display = 'block';
  document.getElementById('overlayTitle').textContent = 'GAME OVER';
}

function spawnObstacle() {
  const types = ['cactus_s','cactus_m','cactus_l','cactus_2','bird'];
  const t = types[Math.floor(Math.random() * types.length)];
  let ob = { type: t, x: W() + 20 };
  if (t === 'bird') { ob.w = 42; ob.h = 26; ob.y = GROUND() - (Math.random() < 0.5 ? 65 : 115); ob.wingFrame = 0; }
  else if (t === 'cactus_s') { ob.w = 22; ob.h = 42; ob.y = GROUND() - 42; }
  else if (t === 'cactus_m') { ob.w = 26; ob.h = 54; ob.y = GROUND() - 54; }
  else if (t === 'cactus_l') { ob.w = 32; ob.h = 62; ob.y = GROUND() - 62; }
  else if (t === 'cactus_2') { ob.w = 52; ob.h = 50; ob.y = GROUND() - 50; }
  obstacles.push(ob);
}

function update() {
  if (state !== 'playing') return;
  frame++;
  speed = 5 + frame / 600;
  document.getElementById('speedLabel').textContent = speed.toFixed(1) + 'x';

  nextObstacle--;
  if (nextObstacle <= 0) {
    spawnObstacle();
    nextObstacle = Math.floor((100 + Math.random() * 80) / (speed / 5));
  }
  obstacles.forEach(o => { o.x -= speed; if (o.type === 'bird') o.wingFrame++; });
  obstacles = obstacles.filter(o => o.x > -80);

  players.forEach((p, i) => {
    if (!p.alive || p.flashTimer > 30) return;
    p.ducking = p.duckKey && p.y >= GROUND() - DINO_H;
    p.vy += GRAVITY;
    p.y += p.vy;
    const ground = GROUND() - (p.ducking ? DINO_DUCK_H : DINO_H);
    if (p.y >= ground) { p.y = ground; p.vy = 0; }
    p.score = Math.floor(frame / 6);
    if (p.score > hiScore[i]) hiScore[i] = p.score;

    const ph = p.ducking ? DINO_DUCK_H : DINO_H;
    const px = p.x + 5, py = p.y + 5, pw = DINO_W - 10, phh = ph - 10;
    obstacles.forEach(o => {
      const ox = o.x + 3, oy = o.y + 3, ow = o.w - 6, oh = o.h - 6;
      if (px < ox + ow && px + pw > ox && py < oy + oh && py + phh > oy) endRound(p);
    });
  });

  players.forEach(p => { if (p.flashTimer > 0) p.flashTimer--; });
  document.getElementById('score1').textContent = players[0].score;
  document.getElementById('score2').textContent = players[1].score;
  document.getElementById('hi1').textContent = hiScore[0];
  document.getElementById('hi2').textContent = hiScore[1];
}

function drawBrachio(x, y, w, h, color, outline, isFlash, labelText, legPhase, isJumping, isDucking) {
  if (isFlash) return;
  ctx.save();
  const scale = isDucking ? (h / 40) : (h / 80);
  const tx = x + w / 2 - 30 * scale;
  const ty = y + h - (isDucking ? 40 : 80) * scale;
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);
  ctx.strokeStyle = outline;
  ctx.fillStyle = color;
  ctx.lineWidth = 4.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (!isDucking) {
    ctx.beginPath(); ctx.ellipse(38, 58, 20, 14, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(24, 50); ctx.quadraticCurveTo(18, 30, 18, 16); ctx.lineTo(34, 16); ctx.quadraticCurveTo(36, 32, 38, 48); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(26, 10, 10, 9, -0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(29, 7, 3, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
    ctx.fillStyle = outline; ctx.beginPath(); ctx.arc(30, 7.5, 1.5, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = color;
    ctx.beginPath(); ctx.moveTo(56, 54); ctx.quadraticCurveTo(70, 50, 76, 57); ctx.quadraticCurveTo(70, 62, 56, 62); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.lineWidth = 5;
    if (isJumping) {
      ctx.beginPath(); ctx.moveTo(28, 70); ctx.lineTo(25, 78); ctx.stroke(); ctx.beginPath(); ctx.moveTo(35, 71); ctx.lineTo(33, 78); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(44, 71); ctx.lineTo(46, 78); ctx.stroke(); ctx.beginPath(); ctx.moveTo(50, 70); ctx.lineTo(52, 78); ctx.stroke();
    } else {
      let lp = legPhase === 0 ? 82 : 86;
      let rp = legPhase === 0 ? 86 : 82;
      ctx.beginPath(); ctx.moveTo(28, 70); ctx.lineTo(26, lp); ctx.stroke(); ctx.beginPath(); ctx.moveTo(35, 71); ctx.lineTo(35, rp); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(44, 71); ctx.lineTo(46, rp); ctx.stroke(); ctx.beginPath(); ctx.moveTo(50, 70); ctx.lineTo(50, lp); ctx.stroke();
    }
  } else {
    ctx.beginPath(); ctx.ellipse(35, 22, 24, 11, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(14, 16); ctx.quadraticCurveTo(8, 14, 4, 12); ctx.quadraticCurveTo(4, 20, 10, 22); ctx.quadraticCurveTo(16, 24, 18, 26); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(3, 14, 8, 6, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(5, 11, 2.5, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
    ctx.fillStyle = outline; ctx.beginPath(); ctx.arc(6, 11.5, 1.2, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = color;
    ctx.beginPath(); ctx.moveTo(57, 18); ctx.quadraticCurveTo(66, 15, 70, 20); ctx.quadraticCurveTo(66, 26, 57, 28); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(22, 32); ctx.lineTo(20, 40); ctx.stroke(); ctx.beginPath(); ctx.moveTo(30, 33); ctx.lineTo(30, 40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(42, 33); ctx.lineTo(43, 40); ctx.stroke(); ctx.beginPath(); ctx.moveTo(50, 32); ctx.lineTo(51, 40); ctx.stroke();
  }
  ctx.restore();
  ctx.save(); ctx.fillStyle = color; ctx.font = `bold 10px Copperplate, fantasy`; ctx.textAlign = 'center'; ctx.fillText(labelText, x + w / 2, y - 4); ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W(), H());

  // Sky - Matches style.css main background
  ctx.fillStyle = '#6D94C5';
  ctx.fillRect(0, 0, W(), H());

  // Ground line - Matches primary text/border color
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, GROUND(), W(), 4);
  
  // Ground texture dots
  ctx.fillStyle = '#BF5700';
  for (let i = 0; i < W(); i += 50) {
    ctx.fillRect((i + frame * speed * 0.4) % W(), GROUND() + 10, 20, 3);
  }

  // Clouds
  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  for (let i = 0; i < 3; i++) {
    const cx = ((i * 300 - frame * 0.5) % (W() + 100) + W() + 100) % (W() + 100) - 50;
    const cy = 40 + i * 25;
    ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2); ctx.arc(cx + 22, cy - 6, 14, 0, Math.PI * 2); ctx.arc(cx + 40, cy, 16, 0, Math.PI * 2); ctx.fill();
  }

  obstacles.forEach(o => drawObstacle(o));

  const legPhase = Math.floor(frame / 6) % 2;
  players.forEach(p => {
    if (!p.alive) return;
    const flash = p.flashTimer > 0 && Math.floor(p.flashTimer / 6) % 2 === 0;
    const ph = p.ducking ? DINO_DUCK_H : DINO_H;
    const isJumping = p.y < GROUND() - ph - 2;
    drawBrachio(p.x, p.y, DINO_W, ph, p.color, p.outline, flash, p.name, legPhase, isJumping, p.ducking);
  });
}

function drawObstacle(o) {
  ctx.save();
  ctx.fillStyle = '#000000'; // Black obstacles
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  if (o.type === 'bird') {
    ctx.beginPath(); ctx.ellipse(o.x + 16, o.y + 14, 14, 8, 0, 0, Math.PI * 2); ctx.fill();
    const wf = Math.floor(o.wingFrame / 8) % 2;
    ctx.beginPath();
    if (wf === 0) { ctx.moveTo(o.x + 6, o.y + 12); ctx.quadraticCurveTo(o.x + 16, o.y, o.x + 26, o.y + 12); }
    else { ctx.moveTo(o.x + 6, o.y + 16); ctx.quadraticCurveTo(o.x + 16, o.y + 26, o.x + 26, o.y + 16); }
    ctx.stroke();
  } else {
    const cx = o.x + o.w / 2;
    ctx.beginPath(); ctx.roundRect(cx - 5, o.y, 10, o.h, 4); ctx.fill();
    if (o.type !== 'cactus_s') {
      ctx.beginPath(); ctx.roundRect(o.x, o.y + o.h * 0.25, o.w / 2 - 4, 7, 3); ctx.fill();
      ctx.beginPath(); ctx.roundRect(o.x, o.y + o.h * 0.08, 7, o.h * 0.22, 3); ctx.fill();
      ctx.beginPath(); ctx.roundRect(cx + 4, o.y + o.h * 0.25, o.w / 2 - 4, 7, 3); ctx.fill();
      ctx.beginPath(); ctx.roundRect(o.x + o.w - 7, o.y + o.h * 0.08, 7, o.h * 0.22, 3); ctx.fill();
    }
  }
  ctx.restore();
}

function updateLives() {
  const hearts = n => '♥ '.repeat(n) + '♡ '.repeat(3 - n);
  document.getElementById('lives1').textContent = 'P1: ' + hearts(players[0].lives);
  document.getElementById('lives2').textContent = 'P2: ' + hearts(players[1].lives);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
updateLives();
loop();
</script>
</body>
</html>
